<!DOCTYPE html>
<html>
<head>
  <title>GTA Map</title>
  <meta charset="utf-8" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #070b0f;
      --surface: #0d1117;
      --surface2: #161b22;
      --border: #21262d;
      --accent: #f0b429;
      --accent2: #e05c2a;
      --text: #e6edf3;
      --muted: #7d8590;
      --danger: #f85149;
      --success: #3fb950;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Rajdhani', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
    }

    /* =================== AUTH SCREEN =================== */
    #authScreen {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: var(--bg);
      position: relative;
      overflow: hidden;
    }

    #authScreen::before {
      content: '';
      position: absolute;
      inset: 0;
      background: 
        radial-gradient(ellipse 60% 50% at 20% 50%, rgba(240,180,41,0.07) 0%, transparent 70%),
        radial-gradient(ellipse 50% 60% at 80% 50%, rgba(224,92,42,0.05) 0%, transparent 70%);
      pointer-events: none;
    }

    .auth-grid {
      position: absolute;
      inset: 0;
      background-image: 
        linear-gradient(rgba(240,180,41,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(240,180,41,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    .auth-box {
      position: relative;
      z-index: 10;
      width: 400px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-top: 2px solid var(--accent);
      padding: 40px;
      clip-path: polygon(0 0, calc(100% - 20px) 0, 100% 20px, 100% 100%, 20px 100%, 0 calc(100% - 20px));
    }

    .auth-logo {
      text-align: center;
      margin-bottom: 32px;
    }

    .auth-logo .title {
      font-size: 32px;
      font-weight: 700;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--accent);
      text-shadow: 0 0 30px rgba(240,180,41,0.4);
    }

    .auth-logo .subtitle {
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 3px;
      margin-top: 4px;
    }

    .tab-row {
      display: flex;
      margin-bottom: 28px;
      border-bottom: 1px solid var(--border);
    }
